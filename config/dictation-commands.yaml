# Voice Commands Configuration
# ============================
#
# Commands are currently disabled.
# To re-enable, uncomment and customize the example commands below.
#
# Each command needs:
#   patterns:  List of phrases that trigger this command (case-insensitive).
#              All words in a pattern must appear in the transcription.
#   action:    Shell command to execute.
#   respond:   Optional message to print.
#
# Tips:
#   - Use long, specific patterns to avoid accidental triggers
#     e.g. "hey computer open my qbraid email" is safer than "open email"
#   - Add multiple variations for how you might say the same thing

commands: []

